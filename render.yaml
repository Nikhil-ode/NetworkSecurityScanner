services:
  - type: web
    name: network-security-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: rm -rf staticfiles && python manage.py collectstatic --noinput && python manage.py migrate --noinput && python -m daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: USE_SQLITE
        value: "False"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://networksecurityscanner.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://networksecurityscanner.onrender.com"
      - key: SECRET_KEY
        value: render-secret-key-change-in-production
      - key: SUPABASE_URL
        value: "https://lqnzzpfypipkawujfprq.supabase.co"
      - key: SUPABASE_KEY
        value: "replace_with_your_publishable_key"
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: DB_NAME
        value: "postgres"
      - key: DB_USER
        value: "postgres.lqnzzpfypipkawujfprq"
      - key: DB_PASSWORD
        value: "replace_with_your_db_password"
      - key: DB_HOST
        value: "aws-1-ap-northeast-1.pooler.supabase.com"
      - key: DB_PORT
        value: "6543"