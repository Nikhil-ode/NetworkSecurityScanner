services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8443:8443"
    environment:
      - USE_SQLITE=True
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=https://localhost:3000,https://localhost:3001
    volumes:
      - scan_logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  scan_logs:
